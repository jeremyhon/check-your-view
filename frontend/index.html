<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Your View</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/cesium@1.139.0/Build/Cesium/Widgets/widgets.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="panelToggleBtn" type="button" aria-expanded="true">Hide Panel</button>
    <section id="compassOverlay" class="compass-overlay" aria-live="polite" aria-label="Compass">
      <div class="compass-window" aria-hidden="true">
        <div id="compassTrack" class="compass-track"></div>
        <span class="compass-center-marker"></span>
      </div>
      <p id="compassReadout" class="compass-readout">N 0.0°</p>
    </section>
    <div id="app">
      <aside id="panel">
        <h1>Check Your View</h1>
        <p class="muted">A quick way to verify the view from the flat of your dreams.</p>

        <label for="searchInput">Search Location</label>
        <input id="searchInput" type="text" placeholder="Search address or building" />
        <div id="searchResults" class="search-results"></div>

        <p id="miniMapInstruction" class="mini-map-instruction"></p>
        <label for="miniMap">Location Mini Map</label>
        <div id="miniMap" aria-label="Location mini map"></div>

        <div class="row">
          <div>
            <label for="lat">Latitude</label>
            <input id="lat" type="number" step="0.000001" />
          </div>
          <div>
            <label for="lng">Longitude</label>
            <input id="lng" type="number" step="0.000001" />
          </div>
        </div>

        <div class="row row-three">
          <div>
            <label for="floorLevel">Floor Level</label>
            <input id="floorLevel" type="number" step="1" min="0" />
          </div>
          <div>
            <label for="floorHeightM">Floor Height (m)</label>
            <input id="floorHeightM" type="number" step="0.1" min="0.1" />
          </div>
          <div>
            <label for="heightM">Height (m)</label>
            <input id="heightM" type="number" step="0.1" />
          </div>
        </div>

        <div class="row row-three">
          <div>
            <label for="fovDeg">FOV (deg)</label>
            <input id="fovDeg" type="number" step="0.1" />
          </div>
          <div>
            <label for="headingDeg">Heading (deg)</label>
            <input id="headingDeg" type="number" step="0.1" />
          </div>
          <div>
            <label for="pitchDeg">Pitch (deg)</label>
            <input id="pitchDeg" type="number" step="0.1" />
          </div>
        </div>

        <div class="row row-single">
          <div>
            <label for="baseMap">Basemap</label>
            <select id="baseMap">
              <option value="OrthoJPG">Ortho</option>
              <option value="DefaultRoad">Road</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="applyBtn" type="button">Apply</button>
          <button id="copyBtn" type="button">Copy Share Link</button>
        </div>

        <p id="status" class="status"></p>
        <p class="hint">Drag in the viewer to rotate orientation. Position is locked.</p>

        <details id="debugPanel" class="debug-panel">
          <summary>Debug Rendering</summary>
          <div class="debug-grid">
            <label class="debug-toggle" for="debugFogEnabled">
              <input id="debugFogEnabled" type="checkbox" />
              <span>Fog Enabled</span>
            </label>
            <label class="debug-toggle" for="debugDynamicSse">
              <input id="debugDynamicSse" type="checkbox" />
              <span>Dynamic SSE</span>
            </label>
            <label class="debug-toggle" for="debugSkipLod">
              <input id="debugSkipLod" type="checkbox" />
              <span>Skip LOD</span>
            </label>
            <label class="debug-toggle" for="debugFoveatedSse">
              <input id="debugFoveatedSse" type="checkbox" />
              <span>Foveated SSE</span>
            </label>
            <label class="debug-toggle" for="debugCullWithChildren">
              <input id="debugCullWithChildren" type="checkbox" />
              <span>Cull With Children Bounds</span>
            </label>
            <label class="debug-toggle" for="debugCullWhileMoving">
              <input id="debugCullWhileMoving" type="checkbox" />
              <span>Cull While Moving</span>
            </label>
            <label class="debug-toggle" for="debugLoadSiblings">
              <input id="debugLoadSiblings" type="checkbox" />
              <span>Load Siblings</span>
            </label>
          </div>
          <div class="row">
            <div>
              <label for="debugMaxSse">Max SSE</label>
              <input id="debugMaxSse" type="number" min="1" max="512" step="1" />
            </div>
            <div>
              <label for="debugCullMultiplier">Cull Moving Mult.</label>
              <input id="debugCullMultiplier" type="number" min="1" max="64" step="1" />
            </div>
          </div>
        </details>
      </aside>
      <main id="viewerContainer"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cesium@1.139.0/Build/Cesium/Cesium.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./app.ts"></script>
    <a
      id="repoLink"
      href="https://github.com/jeremyhon/check-your-view"
      target="_blank"
      rel="noopener noreferrer"
      >GitHub</a
    >
  </body>
</html>
